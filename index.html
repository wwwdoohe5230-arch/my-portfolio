<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waddah Mohammed | IT Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent-color: #38bdf8; --text-primary: #f8fafc; --text-secondary: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); }
        header { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.8)), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80'); background-size: cover; text-align: center; border-bottom: 2px solid var(--accent-color); }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        .scanner-tool { background: #000; border: 1px solid var(--accent-color); padding: 20px; border-radius: 10px; margin-top: 15px; }
        .scanner-tool input { background: #1e293b; border: 1px solid #475569; color: white; padding: 10px; width: 60%; border-radius: 5px; }
        .scanner-tool button { background: var(--accent-color); color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .output { margin-top: 15px; color: #10b981; font-family: monospace; }
    </style>
</head>
<body>
    <header>
        <h1>وضاح محمد الريح</h1>
        <p>طالب IT | كلية الإمارات للعلوم والتكنولوجيا</p>
    </header>
    <div class="container">
        <div class="card">
            <h2>👤 السيرة الذاتية</h2>
            <p>متخصص في حلول تقنية المعلومات وباحث في الأمن السيبراني. تحت إشراف د. محمد عثمان.</p>
        </div>
        <div class="card">
            <h2>🛡️ أداة فحص المنافذ والمشاريع</h2>
            <div class="scanner-tool">
                <input type="text" id="target" placeholder="google.com">
                <button onclick="run()">فحص الآن</button>
                <div id="out" class="output"></div>
            </div>
        </div>
    </div>
    <script>
        function run() {
            const out = document.getElementById('out');
            out.innerHTML = "[$] جاري بدء الفحص... <br> [+] الأهداف آمنة تماماً.";
        }
    </script>
</body>
</html>
